set -g default-command "${SHELL}"

# =====================================================================
# NEOVIM RESPONSIVENESS & INPUTS
# =====================================================================

# Remove the delay when pressing the Esc key (Vital for Vim modal editing)
set -s escape-time 0

# Increase scrollback buffer history from the default 2000 lines
set -g history-limit 50000

# Increase tmux messages display duration to 4 seconds
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often (every 5 seconds)
set -g status-interval 5

# Enable focus events (Let's Neovim know when you switch tmux panes/windows)
set -g focus-events on

# Enable mouse support for resizing panes and scrolling
set -g mouse on

# Enable vi mode for copy state
set-window-option -g mode-keys vi

# Select and copy in copy mode

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# =====================================================================
# ERGONOMIC PREFIX & WINDOW INDEXING
# =====================================================================

# Change prefix from Ctrl-b to Ctrl-Space (Much easier to reach)
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# Don't rename windows automatically
set-option -g allow-rename off

# Key bindings
bind-key -n M-n new-window
bind-key -n C-Left previous-window
bind-key -n C-Right next-window

bind-key -n M-1 select-window -t :1
bind-key -n M-2 select-window -t :2
bind-key -n M-3 select-window -t :3
bind-key -n M-4 select-window -t :4
bind-key -n M-5 select-window -t :5
bind-key -n M-6 select-window -t :6
bind-key -n M-7 select-window -t :7
bind-key -n M-8 select-window -t :8
bind-key -n M-9 select-window -t :9

# Reload config file
bind r source-file "$HOME/.config/tmux/tmux.conf"

# Alt + s opens an interactive menu to jump between sessions
bind-key -n M-s choose-tree -Zs

# Start window and pane numbering at 1 instead of 0 (Matches keyboard layout)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# =====================================================================
# SPLIT WINDOWS IN THE CURRENT PATH
# =====================================================================

# Open new splits/windows in the same directory as the current pane
# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# =====================================================================
# TRUE COLOR & TERMINAL BEHAVIOR (Fixes Neovim theme/background bugs)
# =====================================================================

# Set default terminal identifier to support 256 colors
set -g default-terminal "tmux-256color"

# Tell tmux that the outside terminal supports true color (RGB)
# (Crucial for Neovim themes like Catppuccin, Gruvbox, or Tokyo Night)
set -as terminal-features ",*:RGB"

# Enable undercurl support (curly underlines for LSP diagnostics/errors)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# Enable undercurl color support
set -as terminal-overrides ',*:Setqc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%d::%p1%{256}%&%d%;m'

# DESIGN TWEAKS

# Don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Clock mode
setw -g clock-mode-colour #cba364

# Copy mode
setw -g mode-style 'fg=#141617 bg=#d4be98'

# Panes
set -g pane-active-border-style "fg=#a89984"
set -g pane-border-style "fg=#504945"

# Windows
setw -g window-status-activity-style "none"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#d67b76,bg=#32302f"
setw -g window-status-format "#[fg=#d67b76,bg=#32302f] #I #[fg=#d67b76,bg=#32302f] #W "
setw -g window-status-current-format "#[fg=#32302f,bg=#504945,nobold,nounderscore,noitalics]#[fg=#d67b76,bg=#504945] #I #[fg=#d67b76,bg=#504945] #W #[fg=#504945,bg=#32302f,nobold,nounderscore,noitalics]"

# Statusbar
set -g status-justify "left"
set -g status "on"
set -g status-left-style "none"
set -g status-right-style "none"
set -g status-style "none,bg=#32302f"
set -g status-right-length "100"
set -g status-left-length "100"
set -g status-left "#[fg=#282828,bg=#d67b76,bold] #S #[fg=#d67b76,bg=#32302f,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#504945,bg=#32302f,nobold,nounderscore,noitalics]#[fg=#cba364,bg=#504945] %d-%m-%Y  %H:%M #[fg=#cba364,bg=#504945,nobold,nounderscore,noitalics]#[fg=#282828,bg=#cba364,bold] #h "

# Messages
set -g message-style "fg=#d67b76,bg=#282828"
set -g message-command-style "fg=#d67b76,bg=#504945"


# PLUGINS

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set-option -g @plugin 'b0o/tmux-autoreload'

# AUTOMATIC ENVIRONMENT RESTORE: Restores layout when tmux starts
set -g @continuum-restore 'on'

# AUTOMATIC SYSTEM BOOT: Spins up tmux on system boot
set -g @continuum-boot 'on'

# AUTOMATIC ENVIRONMENT SAVE (Every 5 minutes)
set -g @continuum-save-interval '5'

# Restore Neovim sessions
set -g @resurrect-strategy-nvim 'session'

# Restore terminal screen text history
set -g @resurrect-capture-pane-contents 'on'

# TPACK: Plugin manager initialization
run 'tpack init'
